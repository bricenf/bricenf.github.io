<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/vega/3.0.0-beta.36/vega.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vega-lite/2.0.0-beta.5/vega-lite.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vega-embed/3.0.0-beta.18/vega-embed.js"></script>
<style>

backgroundColor {
  background-color:yellow;
}

* {box-sizing: border-box;}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

.header {
  overflow: hidden;
  background-color: #f1f1f1;
  padding: 20px 10px;
}

.vega-actions a {
      padding: 0.2em;
    }

.header a {
  float: left;
  color: black;
  text-align: center;
  padding: 12px;
  text-decoration: none;
  font-size: 18px;
  line-height: 25px;
  border-radius: 4px;
}

.header a.logo {
  font-size: 25px;
  font-weight: bold;
}

.header a:hover {
  background-color: #ddd;
  color: black;
}

.header a.active {
  background-color: dodgerblue;
  color: white;
}

.header-right {
  float: right;
}

@media screen and (max-width: 500px) {
  .header a {
    float: none;
    display: block;
    text-align: left;
  }

  .header-right {
    float: none;
  }
}
</style>
</head>

<meta charset="utf-8">



<body>

  <script type="text/javascript">
  var outerWidth = 'Javascript is working';
  document.write(outerWidth);
  </script>

  <select id="Indicator">
        <option value="None">-- Select --</option>
        <option value="1">Population Density</option>
        <option value="2" selected>Population</option>
        <option value="3">Household, Average Size</option>
        <option value="4" selected>Families, Married</option>
        <option value="5" selected>Other Families, Male Householder, No Wife Present</option>
        <option value="6" selected>Other Families, Female Householder, No Husband Present</option>
        <option value="7" selected>% Family Population</option>
        <option value="8" selected>% Population, Male</option>
        <option value="9" selected>% Population, Female</option>
        <option value="10" selected>% White Population, Alone</option>
        <option value="11" selected>% Black Population, Alone</option>
        <option value="12" selected>% Asian Population, Alone</option>
        <option value="13" selected>% American Indian and Alaska Native Population, Alone</option>
        <option value="14" selected>% Other Race Population, Alone</option>
        <option value="15" selected>% Other Race Population, Alone</option>
        <option value="16" selected>% Two or More Races Population</option>
    </select>

  <script src="https://d3js.org/d3.v4.min.js"></script>

  <script type="text/javascript">

    function GetSelectedValue(){
      var e = document.getElementById("Indicator");
      var result = e.options[e.selectedIndex].value;
      document.getElementById("result").innerHTML = result;
    }
    function GetSelectedText(){
      var e = document.getElementById("Indicator");
      var result = e.options[e.selectedIndex].text;
      document.getElementById("result").innerHTML = result;
    }

  </script>
  <button type="button" onclick="GetSelectedValue()">Graph Selected Value</button>

  <!-- <button type="button" onclick="GetSelectedText()">Get Selected Text</button> -->

  <p id="result">-- Selected --</p>

  <div id = "bottom">
    <div id="vis"></div>
    <script type="text/javascript">
    const spec = "Graphv2_1.json";
    vega.embed('#vis', spec);
    </script>
  </div>

</body>
