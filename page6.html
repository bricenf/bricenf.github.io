<!-- https://www.w3schools.com/howto/howto_js_hover_tabs.asp -->




<!DOCTYPE htmml>
<style>

  /* Style the tab */
  .tab {
    float: left;
    border: 1px solid #ccc;
    background-color: #f1f1f1;
    width: 30%;
    height: 300px;
  }

  /* Style the buttons that are used to open the tab content */
  .tab button {
    display: block;
    background-color: inherit;
    color: black;
    padding: 22px 16px;
    width: 100%;
    border: none;
    outline: none;
    text-align: left;
    cursor: pointer;
  }

  /* Change background color of buttons on hover */
  .tab button:hover {
    background-color: #ddd;
  }

  /* Create an active/current "tab button" class */
  .tab button.active {
    background-color: #ccc;
  }

  /* Style the tab content */
  .tabcontent {
    float: left;
    padding: 0px 12px;
    border: 1px solid #ccc;
    width: 70%;
    border-left: none;
    height: 300px;
    display: none;
  }

</style>

<script>
  function experiences(evt, experiencesName) {
    // Declare all variables
    var i, tabcontent, tablinks;

    // Get all elements with class="tabcontent" and hide them
    tabcontent = document.getElementsByClassName("tabcontent");
    for (i = 0; i < tabcontent.length; i++) {
      tabcontent[i].style.display = "none";
    }

    // Get all elements with class="tablinks" and remove the class "active"
    tablinks = document.getElementsByClassName("tablinks");
    for (i = 0; i < tablinks.length; i++) {
      tablinks[i].className = tablinks[i].className.replace(" active", "");
    }

    // Show the current tab, and add an "active" class to the link that opened the tab
    document.getElementById(experiencesName).style.display = "block";
    evt.currentTarget.className += " active";
  }
</script>




<div class="tab">
  <button class="tablinks" onmouseover="experiences(event, '2020')">2020</button>
  <button class="tablinks" onmouseover="experiences(event, '2021')">2021</button>
</div>

<div id="2020" class="tabcontent">
  <h3>2020</h3>
  <h2>Academics</h2>
  <p>London is the capital city of England.</p>
  <h2>Extracurriculars</h2>
  <p>Baruch Traders Club</p>
  <p>IMG</p>
  <h2>Work Experience</h2>
  <p> Interned at Resilient Cities Catalyst</p>
  <p> Federal Work Study</p>
</div>

<div id="2021" class="tabcontent">
  <h3>Paris</h3>
  <p>Paris is the capital of France.</p>
</div>
