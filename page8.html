<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/vega/3.0.0-beta.36/vega.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vega-lite/2.0.0-beta.5/vega-lite.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vega-embed/3.0.0-beta.18/vega-embed.js"></script>
<style>

backgroundColor {
  background-color:yellow;
}

* {box-sizing: border-box;}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

.header {
  overflow: hidden;
  background-color: #f1f1f1;
  padding: 20px 10px;
}

.vega-actions a {
      padding: 0.2em;
    }

.header a {
  float: left;
  color: black;
  text-align: center;
  padding: 12px;
  text-decoration: none;
  font-size: 18px;
  line-height: 25px;
  border-radius: 4px;
}

.header a.logo {
  font-size: 25px;
  font-weight: bold;
}

.header a:hover {
  background-color: #ddd;
  color: black;
}

.header a.active {
  background-color: dodgerblue;
  color: white;
}

.header-right {
  float: right;
}

@media screen and (max-width: 500px) {
  .header a {
    float: none;
    display: block;
    text-align: left;
  }

  .header-right {
    float: none;
  }
}
</style>
</head>
<body>


<div style="padding-left:20px">











  <h1>Watson Foundation Summer 2021 Interns</h1>

  <div id="myChart">

  <!-- Drop-down -->
  <select id="chart-selector" name="chart-selector">

    <option value="">Choose a Watson cohort</option>
    <option value="0">2021</option>
    <option value="1">2022</option>
    <option value="2">2023</option>

  </select>

</div>







  <div id="vis"></div>

    <script>
      const spec = "WatsonGraphV3.json";
    	vega.embed('#vis', spec);
    </script>








</div>

</body>
</html>
