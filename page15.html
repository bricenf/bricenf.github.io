<script>

function getTime(){
var today = new Date();
var date = today.getFullYear()+'-'+(today.getMonth()+1)+'-'+today.getDate();
var time = today.getHours() + ":" + today.getMinutes() + ":" + today.getSeconds();

var dateTime = date+' '+time;

document.getElementById("myDate").innerHTML = dateTime;
}

function formatAMPM() {
  var time = new Date();
  var output = time.toLocaleString('en-US', { month: 'long', day: 'numeric', year: 'numeric', hour: 'numeric', minute: 'numeric', hour12: true });
  document.getElementById("myDate").innerHTML = output;
}


</script>
