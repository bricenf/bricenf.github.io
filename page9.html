<!DOCTYPE html>

<style>
  body {
      height: 3000px;
  }

  .wrapper {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      position: fixed;
  }

  .circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background-color: greenyellow;
      text-align: center;
      vertical-align: middle;
      display: table-cell;
  }

  #reload {
      width: 50px;
      height: 50px;
  }

</style>
