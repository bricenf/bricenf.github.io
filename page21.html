<script>

var Communities50 = L.layerGroup();


L.marker([-25.8135, 152.6173]).bindPopup('Bauple').addTo(Communities50);






var mbAttr = 'Map data &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, ' +
    'Imagery © <a href="https://www.mapbox.com/">Mapbox</a>',
  mbUrl = 'https://api.mapbox.com/styles/v1/{id}/tiles/{z}/{x}/{y}?access_token=pk.eyJ1IjoibWFwYm94IiwiYSI6ImNpejY4NXVycTA2emYycXBndHRqcmZ3N3gifQ.rJcFIG214AriISLbB6B5aw';

var grayscale   = L.tileLayer(mbUrl, {id: 'mapbox/light-v9', tileSize: 512, zoomOffset: -1, attribution: mbAttr}), streets  = L.tileLayer(mbUrl, {id: 'mapbox/streets-v11', tileSize: 512, zoomOffset: -1, attribution: mbAttr});

var map = L.map('map', {
  center: [41.30836713561545, -72.92718657558162],
  zoom: 13,
  layers: [grayscale, Private,Non_Profit,Public]
});

var baseLayers = {
  "Grayscale": grayscale,
  "Streets": streets
};

var overlays = {
  //"Cities": cities,
  //"Tetsting Overlays": TestingOverlays,
  "Private": Private,
  "Non Profit": Non_Profit,
  "Public":Public
};

L.control.layers(baseLayers, overlays).addTo(map);

</script>
